<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — ChainOps UI Kit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/chainops.css" />
  <link rel="stylesheet" href="../assets/css/animations.css" />
  <style>
    :root { --font: 'Space Grotesk', system-ui, sans-serif; }
    body { font-family: var(--font); display: grid; place-items: center; min-height: 100vh; background: var(--bg-base, #070b14); padding: 24px; }
    .auth-card {
      width: min(480px, 100%); border: 1px solid rgba(148,163,184,0.1);
      border-radius: 22px; background: rgba(10,17,33,0.95);
      padding: 44px 40px; box-shadow: 0 32px 80px rgba(0,0,0,0.55);
      animation: fadeUp 0.55s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    .ac-logo { display: flex; align-items: center; gap: 9px; margin-bottom: 28px; }
    .ac-logo-mark { width: 30px; height: 30px; border-radius: 8px; background: linear-gradient(135deg, #22d3ee, #818cf8, #c084fc); display: grid; place-items: center; }
    .ac-logo-mark svg { width: 14px; height: 14px; color: #04101a; }
    .ac-logo-name { font-size: 0.88rem; font-weight: 600; }
    h1 { font-size: 1.35rem; font-weight: 700; letter-spacing: -0.03em; margin-bottom: 4px; }
    .ac-sub { font-size: 0.84rem; color: var(--text-secondary, #7a94b8); margin-bottom: 26px; line-height: 1.6; }

    .form-group { margin-bottom: 13px; }
    .form-label { display: block; font-size: 0.77rem; font-weight: 600; color: rgba(237,242,252,0.7); margin-bottom: 6px; }
    .form-row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .form-input {
      width: 100%; padding: 11px 13px; border-radius: 10px;
      border: 1px solid rgba(148,163,184,0.12); background: rgba(255,255,255,0.04);
      color: #edf2fc; font-family: var(--font); font-size: 0.88rem;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease; outline: none;
    }
    .form-input:focus { border-color: rgba(34,211,238,0.45); background: rgba(34,211,238,0.04); box-shadow: 0 0 0 3px rgba(34,211,238,0.08); }
    .form-input::placeholder { color: rgba(122,148,184,0.4); }

    /* Password strength indicator */
    .strength-track { height: 3px; border-radius: 999px; background: rgba(255,255,255,0.06); margin-top: 7px; overflow: hidden; }
    .strength-fill { height: 100%; border-radius: 999px; width: 0%; transition: width 0.3s ease, background 0.3s ease; }

    .form-check { display: flex; align-items: flex-start; gap: 9px; font-size: 0.8rem; color: rgba(122,148,184,0.75); margin-bottom: 20px; line-height: 1.55; cursor: pointer; }
    .form-check input { accent-color: #22d3ee; margin-top: 1px; flex-shrink: 0; }
    .form-check a { color: #22d3ee; text-decoration: none; }

    .auth-submit {
      width: 100%; padding: 12px; border-radius: 10px; border: none;
      background: linear-gradient(135deg, #22d3ee, #818cf8, #c084fc);
      color: #04101a; font-family: var(--font); font-size: 0.92rem; font-weight: 700; cursor: pointer;
      box-shadow: 0 6px 24px rgba(34,211,238,0.28);
      transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s ease;
    }
    .auth-submit:hover { transform: translateY(-2px); box-shadow: 0 12px 36px rgba(34,211,238,0.38); }
    .auth-submit:active { transform: scale(0.97); }

    .auth-divider { display: flex; align-items: center; gap: 10px; margin: 20px 0; }
    .auth-divider::before, .auth-divider::after { content: ''; flex: 1; height: 1px; background: rgba(148,163,184,0.1); }
    .auth-divider span { font-size: 0.72rem; color: rgba(122,148,184,0.5); }

    .social-btn {
      width: 100%; display: flex; align-items: center; justify-content: center; gap: 9px;
      padding: 10px; border-radius: 10px; border: 1px solid rgba(148,163,184,0.14);
      background: rgba(255,255,255,0.025); color: rgba(237,242,252,0.8);
      font-family: var(--font); font-size: 0.85rem; font-weight: 500; cursor: pointer;
      transition: background 0.15s ease, transform 0.2s ease;
    }
    .social-btn:hover { background: rgba(255,255,255,0.055); transform: translateY(-1px); }
    .social-btn svg { width: 16px; height: 16px; }
    .auth-footer-link { text-align: center; margin-top: 18px; font-size: 0.82rem; color: rgba(122,148,184,0.6); }
    .auth-footer-link a { color: #22d3ee; text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="ac-logo">
      <div class="ac-logo-mark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><rect x="3" y="3" width="8" height="8" rx="2"/><rect x="13" y="3" width="8" height="5" rx="2"/><rect x="13" y="10" width="8" height="11" rx="2"/><rect x="3" y="13" width="8" height="8" rx="2"/></svg></div>
      <div class="ac-logo-name">ChainOps</div>
    </div>
    <h1>Create your account</h1>
    <p class="ac-sub">Fill in the form below. You can connect a wallet after your account is set up.</p>

    <form>
      <div class="form-group form-row2">
        <div>
          <label class="form-label" for="first-name">First name</label>
          <input id="first-name" class="form-input" type="text" placeholder="Alex" autocomplete="given-name" />
        </div>
        <div>
          <label class="form-label" for="last-name">Last name</label>
          <input id="last-name" class="form-input" type="text" placeholder="Rivera" autocomplete="family-name" />
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="su-email">Work email</label>
        <input id="su-email" class="form-input" type="email" placeholder="you@company.com" autocomplete="email" />
      </div>
      <div class="form-group">
        <label class="form-label" for="su-password">Password</label>
        <input id="su-password" class="form-input" type="password" placeholder="Minimum 8 characters" autocomplete="new-password"
          oninput="updateStrength(this.value)" />
        <div class="strength-track"><div class="strength-fill" id="strength-fill"></div></div>
      </div>
      <label class="form-check">
        <input type="checkbox" required />
        I have read and accept the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.
      </label>
      <button type="submit" class="auth-submit">Create Account</button>
    </form>

    <div class="auth-divider"><span>or sign up with</span></div>
    <button class="social-btn" type="button">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M22.5 12.2c0-.8-.1-1.5-.2-2.2H12v4.2h5.9c-.3 1.3-1 2.4-2 3.1v2.6h3.3c1.9-1.8 3-4.4 3-7.7z" fill="#4285F4"/><path d="M12 23c3 0 5.4-1 7.2-2.7l-3.3-2.6c-.9.6-2.1 1-3.9 1-3 0-5.5-2-6.4-4.8H2.2v2.7C4 20.4 7.7 23 12 23z" fill="#34A853"/><path d="M5.6 13.9c-.2-.6-.4-1.3-.4-1.9s.1-1.3.4-1.9V7.4H2.2C1.4 8.9 1 10.4 1 12s.4 3.1 1.2 4.6l3.4-2.7z" fill="#FBBC05"/><path d="M12 5.4c1.7 0 3.2.6 4.4 1.7l3.3-3.3C17.5 2 15 1 12 1 7.7 1 4 3.6 2.2 7.4l3.4 2.7C6.5 7.4 9 5.4 12 5.4z" fill="#EA4335"/></svg>
      Continue with Google
    </button>

    <div class="auth-footer-link" style="margin-top:16px">
      Already have an account? <a href="auth-login">Sign in</a>
    </div>
  </div>
  <script>
    function updateStrength(v) {
      const el = document.getElementById('strength-fill');
      let score = 0;
      if (v.length >= 8) score++;
      if (/[A-Z]/.test(v)) score++;
      if (/[0-9]/.test(v)) score++;
      if (/[^A-Za-z0-9]/.test(v)) score++;
      const pcts = ['0%','28%','55%','78%','100%'];
      const cols = ['','#fb7185','#fbbf24','#34d399','#22d3ee'];
      el.style.width  = pcts[score];
      el.style.background = cols[score];
    }
  </script>
  <script src="../assets/js/animations.js"></script>
</body>
</html>
