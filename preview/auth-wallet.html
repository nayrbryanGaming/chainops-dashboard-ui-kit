<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connect Wallet — ChainOps UI Kit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/chainops.css?v=1782808504375" />
  <link rel="stylesheet" href="../assets/css/animations.css?v=1782807464658" />
  <style>
    :root { --font: 'Space Grotesk', system-ui, sans-serif; }
    body { font-family: var(--font); display: grid; place-items: center; min-height: 100vh; background: var(--bg-base, #070b14); padding: 24px; }
    .auth-card {
      width: min(420px, 100%); border: 1px solid rgba(148,163,184,0.1);
      border-radius: 22px; background: rgba(10,17,33,0.95);
      padding: 44px 40px; box-shadow: 0 32px 80px rgba(0,0,0,0.55);
      animation: scaleIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    .ac-icon {
      width: 48px; height: 48px; border-radius: 14px;
      background: linear-gradient(135deg, rgba(34,211,238,0.15), rgba(167,139,250,0.15));
      border: 1px solid rgba(34,211,238,0.2);
      display: grid; place-items: center; margin-bottom: 24px;
      color: #22d3ee;
    }
    h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.03em; margin-bottom: 6px; }
    .ac-sub { font-size: 0.86rem; color: var(--text-secondary, #7a94b8); margin-bottom: 30px; line-height: 1.6; }
    
    .wallet-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
    .wallet-btn {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px; border-radius: 12px; border: 1px solid rgba(148,163,184,0.12);
      background: rgba(255,255,255,0.02); color: rgba(237,242,252,0.9);
      font-family: var(--font); font-size: 0.9rem; font-weight: 600; cursor: pointer;
      transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .wallet-btn:hover { background: rgba(255,255,255,0.06); border-color: rgba(34,211,238,0.3); transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.2); }
    .wallet-btn:active { transform: scale(0.98); }
    .w-icon { width: 28px; height: 28px; border-radius: 6px; display: grid; place-items: center; background: rgba(255,255,255,0.05); }
    
    .auth-footer-link { text-align: center; font-size: 0.82rem; color: rgba(122,148,184,0.6); }
    .auth-footer-link a { color: #22d3ee; text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="ac-icon">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M16 13a1 1 0 1 0 2 0 1 1 0 0 0-2 0z"/></svg>
    </div>
    <h1>Connect Wallet</h1>
    <p class="ac-sub">Choose a provider to sign in. We only request read access to verify ownership.</p>

    <div class="wallet-list">
      <button class="wallet-btn">
        <div class="w-icon" style="background:#f6851b;color:#fff">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M21.1 6.8L12 1.6 2.9 6.8v10.4l9.1 5.2 9.1-5.2V6.8zm-9.1 13l-7.5-4.3v-8.6l7.5-4.3 7.5 4.3v8.6l-7.5 4.3z"/></svg>
        </div>
        MetaMask
      </button>
      <button class="wallet-btn">
        <div class="w-icon" style="background:#3b99fc;color:#fff">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13h2v6h-2zm0 8h2v2h-2z"/></svg>
        </div>
        WalletConnect
      </button>
      <button class="wallet-btn">
        <div class="w-icon" style="background:#0052ff;color:#fff">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="8"/></svg>
        </div>
        Coinbase Wallet
      </button>
    </div>

    <div class="auth-footer-link">
      New here? <a href="auth-signup">Create an account first</a>
    </div>
  </div>
  <script src="../assets/js/animations.js?v=1782807464658"></script>
</body>
</html>
